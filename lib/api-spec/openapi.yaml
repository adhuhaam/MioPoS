openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Restaurant Chain POS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: outlets
    description: Restaurant outlets
  - name: staff
    description: Staff management
  - name: menu
    description: Menu management
  - name: tables
    description: Table management
  - name: orders
    description: Order management
  - name: payments
    description: Payment processing
  - name: reports
    description: Reporting and analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ─────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Staff PIN login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current session
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInfo"
        "401":
          description: Not authenticated

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  # ── Outlets ───────────────────────────────────────────────────────────────
  /outlets:
    get:
      operationId: listOutlets
      tags: [outlets]
      summary: List all outlets
      responses:
        "200":
          description: List of outlets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Outlet"
    post:
      operationId: createOutlet
      tags: [outlets]
      summary: Create an outlet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutletInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Outlet"

  /outlets/{id}:
    get:
      operationId: getOutlet
      tags: [outlets]
      summary: Get outlet by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Outlet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Outlet"
        "404":
          description: Not found
    patch:
      operationId: updateOutlet
      tags: [outlets]
      summary: Update an outlet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutletUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Outlet"
    delete:
      operationId: deleteOutlet
      tags: [outlets]
      summary: Delete an outlet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Staff ─────────────────────────────────────────────────────────────────
  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List staff
      parameters:
        - name: outletId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Staff list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Staff"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Create staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"

  /staff/{id}:
    get:
      operationId: getStaff
      tags: [staff]
      summary: Get staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"
        "404":
          description: Not found
    patch:
      operationId: updateStaff
      tags: [staff]
      summary: Update staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"
    delete:
      operationId: deleteStaff
      tags: [staff]
      summary: Delete staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Menu Categories ───────────────────────────────────────────────────────
  /menu/categories:
    get:
      operationId: listCategories
      tags: [menu]
      summary: List menu categories
      parameters:
        - name: outletId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuCategory"
    post:
      operationId: createCategory
      tags: [menu]
      summary: Create menu category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuCategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuCategory"

  /menu/categories/{id}:
    patch:
      operationId: updateCategory
      tags: [menu]
      summary: Update category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuCategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuCategory"
    delete:
      operationId: deleteCategory
      tags: [menu]
      summary: Delete category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Menu Items ────────────────────────────────────────────────────────────
  /menu/items:
    get:
      operationId: listMenuItems
      tags: [menu]
      summary: List menu items
      parameters:
        - name: outletId
          in: query
          required: true
          schema:
            type: integer
        - name: categoryId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"
    post:
      operationId: createMenuItem
      tags: [menu]
      summary: Create menu item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"

  /menu/items/{id}:
    patch:
      operationId: updateMenuItem
      tags: [menu]
      summary: Update menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
    delete:
      operationId: deleteMenuItem
      tags: [menu]
      summary: Delete menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Modifier Groups ───────────────────────────────────────────────────────
  /menu/modifiers:
    get:
      operationId: listModifierGroups
      tags: [menu]
      summary: List modifier groups for an outlet
      parameters:
        - name: outletId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Modifier groups with options
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModifierGroup"
    post:
      operationId: createModifierGroup
      tags: [menu]
      summary: Create a modifier group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModifierGroupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModifierGroup"

  /menu/modifiers/{groupId}:
    patch:
      operationId: updateModifierGroup
      tags: [menu]
      summary: Update a modifier group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModifierGroupUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModifierGroup"
    delete:
      operationId: deleteModifierGroup
      tags: [menu]
      summary: Delete a modifier group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /menu/modifiers/{groupId}/options:
    post:
      operationId: addModifierOption
      tags: [menu]
      summary: Add an option to a modifier group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModifierOptionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModifierOption"

  /menu/modifiers/{groupId}/options/{optionId}:
    patch:
      operationId: updateModifierOption
      tags: [menu]
      summary: Update a modifier option
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
        - name: optionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModifierOptionInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModifierOption"
    delete:
      operationId: deleteModifierOption
      tags: [menu]
      summary: Delete a modifier option
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
        - name: optionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Menu Item ↔ Modifier Group assignments ───────────────────────────────
  /menu/items/{itemId}/modifier-groups:
    get:
      operationId: listItemModifierGroups
      tags: [menu]
      summary: List modifier groups assigned to a menu item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Modifier groups with options
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModifierGroup"
    post:
      operationId: assignItemModifierGroup
      tags: [menu]
      summary: Assign a modifier group to a menu item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemModifierGroupInput"
      responses:
        "201":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemModifierGroupAssignment"

  /menu/items/{itemId}/modifier-groups/{groupId}:
    delete:
      operationId: unassignItemModifierGroup
      tags: [menu]
      summary: Remove a modifier group from a menu item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  # ── Tables ────────────────────────────────────────────────────────────────
  /tables:
    get:
      operationId: listTables
      tags: [tables]
      summary: List tables for an outlet
      parameters:
        - name: outletId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tables
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Table"
    post:
      operationId: createTable
      tags: [tables]
      summary: Create table
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TableInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Table"

  /tables/{id}:
    patch:
      operationId: updateTable
      tags: [tables]
      summary: Update table
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TableUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Table"
    delete:
      operationId: deleteTable
      tags: [tables]
      summary: Delete table
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Orders ────────────────────────────────────────────────────────────────
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: outletId
          in: query
          schema:
            type: integer
        - name: tableId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [open, billed, paid, cancelled]
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order with items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "404":
          description: Not found
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update order status or discount
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/items:
    post:
      operationId: addOrderItem
      tags: [orders]
      summary: Add item to order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderItemInput"
      responses:
        "201":
          description: Item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderItem"

  /orders/{id}/items/{itemId}:
    patch:
      operationId: updateOrderItem
      tags: [orders]
      summary: Update order item (quantity, notes, kitchen status)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderItem"
    delete:
      operationId: removeOrderItem
      tags: [orders]
      summary: Remove item from order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /orders/{id}/items/{itemId}/modifiers:
    post:
      operationId: addOrderItemModifier
      tags: [orders]
      summary: Attach a modifier option to an order item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderItemModifierInput"
      responses:
        "201":
          description: Modifier attached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderItemModifier"

  # ── Kitchen Display ───────────────────────────────────────────────────────
  /kitchen/orders:
    get:
      operationId: listKitchenOrders
      tags: [orders]
      summary: Active kitchen orders for KDS
      parameters:
        - name: outletId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Active orders for kitchen
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KitchenOrder"

  /kitchen/orders/stream:
    get:
      operationId: streamKitchenOrders
      tags: [orders]
      summary: SSE stream of active kitchen orders (polls every 5 s)
      parameters:
        - name: outletId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Server-Sent Events stream; each event data is a JSON array of KitchenOrder
          content:
            text/event-stream:
              schema:
                type: string

  # ── Payments ──────────────────────────────────────────────────────────────
  /orders/{id}/payments:
    get:
      operationId: listOrderPayments
      tags: [payments]
      summary: List all payment legs recorded for an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment legs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: recordPayment
      tags: [payments]
      summary: Record one payment leg for an order (call multiple times for split tender)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Payment leg recorded; order is marked paid when total payments >= order total
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  # ── Reports ───────────────────────────────────────────────────────────────
  /reports/outlet:
    get:
      operationId: getOutletReport
      tags: [reports]
      summary: Sales report for a specific outlet
      parameters:
        - name: outletId
          in: query
          required: true
          schema:
            type: integer
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month]
            default: today
      responses:
        "200":
          description: Outlet report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutletReport"

  /reports/consolidated:
    get:
      operationId: getConsolidatedReport
      tags: [reports]
      summary: Consolidated report across all outlets
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month]
            default: today
      responses:
        "200":
          description: Consolidated report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsolidatedReport"

  /reports/dashboard:
    get:
      operationId: getDashboard
      tags: [reports]
      summary: Dashboard summary stats
      parameters:
        - name: outletId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    ItemModifierGroupInput:
      type: object
      required: [modifierGroupId]
      properties:
        modifierGroupId:
          type: integer

    ItemModifierGroupAssignment:
      type: object
      properties:
        id:
          type: integer
        menuItemId:
          type: integer
        modifierGroupId:
          type: integer

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Auth schemas ──────────────────────────────────────────────────────
    LoginInput:
      type: object
      required: [outletId, pin]
      properties:
        outletId:
          type: integer
        pin:
          type: string

    AuthResult:
      type: object
      required: [staff, outlet]
      properties:
        staff:
          $ref: "#/components/schemas/Staff"
        outlet:
          $ref: "#/components/schemas/Outlet"

    SessionInfo:
      type: object
      required: [staff, outlet]
      properties:
        staff:
          $ref: "#/components/schemas/Staff"
        outlet:
          $ref: "#/components/schemas/Outlet"

    # ── Outlet schemas ────────────────────────────────────────────────────
    Outlet:
      type: object
      required: [id, name, address, phone, taxRate, currency, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        taxRate:
          type: number
        currency:
          type: string
        createdAt:
          type: string

    OutletInput:
      type: object
      required: [name, address, phone, taxRate, currency]
      properties:
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        taxRate:
