kind = "web"
previewPath = "/"
title = "Restaurant POS"
version = "1.0.0"
id = "artifacts/restaurant-pos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24932

[services.development]
run = "pnpm --filter @workspace/restaurant-pos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/restaurant-pos", "run", "build" ]
publicDir = "artifacts/restaurant-pos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24932"
BASE_PATH = "/"
