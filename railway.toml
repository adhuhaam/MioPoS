[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/restaurant-pos run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
# Fresh DB with production dump: run once via `railway run pnpm --filter @workspace/db run import`
# then comment out releaseCommand. Empty schema / demo data: keep push below.
releaseCommand = "pnpm --filter @workspace/db run push"
