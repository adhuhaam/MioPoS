kind = "mobile"
previewPath = "/pos-mobile/"
title = "POS Mobile"
version = "1.0.0"
id = "artifacts/pos-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/pos-mobile/" ]
localPort = 21435

[services.development]
run = "pnpm --filter @workspace/pos-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pos-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/pos-mobile", "run", "serve" ]

[services.env]
PORT = "21435"
BASE_PATH = "/pos-mobile/"
